<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SafeShift Fraud Detection Pipeline                               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="gIndigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="gSky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gSlate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FAFAF9"/>
  <!-- Subtle grid dots -->
  <g fill="#E8E8EA" opacity="0.6">
    <circle cx="20" cy="20" r="1"/><circle cx="20" cy="60" r="1"/><circle cx="60" cy="20" r="1"/>
  </g>

  <!-- ─────────── Title ─────────── -->
  <text x="700" y="62" text-anchor="middle" font-size="32" font-weight="800" fill="#1A1A1A" letter-spacing="-1">
    SafeShift Fraud Detection Pipeline
  </text>
  <text x="700" y="92" text-anchor="middle" font-size="14" font-weight="500" fill="#6B7280" letter-spacing="0.5">
    Only what a driver or ring can actually control is scored
  </text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- TOP PIPELINE ROW: Trigger → Gate 1 → Gate 2 → Scoring → Routing  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Stage 1: TRIGGER -->
  <g filter="url(#softShadow)">
    <rect x="40" y="170" width="180" height="120" rx="18" fill="url(#gSky)"/>
  </g>
  <!-- cloud-rain icon -->
  <g transform="translate(130, 202)" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -16 -4 a 9 9 0 0 1 17 -3 a 11 11 0 1 1 3 19 h -20 a 9 9 0 0 1 0 -16"/>
    <line x1="-10" y1="18" x2="-12" y2="23"/>
    <line x1="-2" y1="18" x2="-4" y2="23"/>
    <line x1="6" y1="18" x2="4" y2="23"/>
  </g>
  <text x="130" y="252" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Disruption</text>
  <text x="130" y="270" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Rain / AQI / Cyclone</text>
  <text x="130" y="284" text-anchor="middle" font-size="10" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.7)">every 15 min</text>

  <!-- Arrow 1 -->
  <line x1="230" y1="230" x2="288" y2="230" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: GATE 1 -->
  <g filter="url(#softShadow)">
    <rect x="296" y="170" width="180" height="120" rx="18" fill="#fff" stroke="#E8E8EA"/>
  </g>
  <!-- shield-check icon (indigo) -->
  <g transform="translate(386, 202)" fill="none" stroke="#6366F1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 -14 L -12 -9 V 2 C -12 11 -6 17 0 20 C 6 17 12 11 12 2 V -9 Z"/>
    <polyline points="-5,2 -1,6 6,-3"/>
  </g>
  <text x="386" y="252" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A1A">Gate 1</text>
  <text x="386" y="270" text-anchor="middle" font-size="11" fill="#6B7280">Environment verified</text>
  <text x="386" y="284" text-anchor="middle" font-size="10" font-family="IBM Plex Mono, monospace" fill="#9CA3AF">external APIs</text>

  <!-- Arrow 2 -->
  <line x1="486" y1="230" x2="544" y2="230" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: GATE 2 -->
  <g filter="url(#softShadow)">
    <rect x="552" y="170" width="180" height="120" rx="18" fill="#fff" stroke="#E8E8EA"/>
  </g>
  <!-- activity / heartbeat icon -->
  <g transform="translate(642, 210)" fill="none" stroke="#3B82F6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-16,0 -8,0 -4,-10 4,10 8,0 16,0"/>
  </g>
  <text x="642" y="252" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A1A">Gate 2</text>
  <text x="642" y="270" text-anchor="middle" font-size="11" fill="#6B7280">Driver was there</text>
  <text x="642" y="284" text-anchor="middle" font-size="10" font-family="IBM Plex Mono, monospace" fill="#9CA3AF">45+ min online in zone</text>

  <!-- Arrow 3 -->
  <line x1="742" y1="230" x2="800" y2="230" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#arrowIndigo)"/>

  <!-- Stage 4: SCORING ENGINE -->
  <g filter="url(#softShadow)">
    <rect x="808" y="160" width="200" height="140" rx="20" fill="url(#gIndigo)"/>
  </g>
  <!-- gauge icon -->
  <g transform="translate(908, 200)" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -20 10 A 20 20 0 0 1 20 10"/>
    <line x1="0" y1="10" x2="11" y2="-3"/>
    <circle cx="0" cy="10" r="2.5" fill="#fff" stroke="none"/>
  </g>
  <text x="908" y="246" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">Scoring Engine</text>
  <text x="908" y="266" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">weighted sum of 3 signals</text>
  <text x="908" y="284" text-anchor="middle" font-size="10" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.72)">severity × weight</text>

  <!-- Arrow 4 -->
  <line x1="1018" y1="230" x2="1076" y2="230" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5: ROUTING (diamond-ish rounded card) -->
  <g filter="url(#softShadow)">
    <rect x="1084" y="170" width="180" height="120" rx="18" fill="#fff" stroke="#E8E8EA"/>
  </g>
  <!-- git-branch icon -->
  <g transform="translate(1174, 210)" fill="none" stroke="#1A1A1A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-12" cy="-10" r="3"/>
    <circle cx="-12" cy="10" r="3"/>
    <circle cx="12" cy="-10" r="3"/>
    <line x1="-12" y1="-7" x2="-12" y2="7"/>
    <path d="M -12 -4 C -12 2 12 2 12 -7"/>
  </g>
  <text x="1174" y="252" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1A1A">Routing</text>
  <text x="1174" y="270" text-anchor="middle" font-size="11" fill="#6B7280">3 outcomes</text>
  <text x="1174" y="284" text-anchor="middle" font-size="10" font-family="IBM Plex Mono, monospace" fill="#9CA3AF">thresholds: 0.30 / 0.70</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: 3 SIGNAL CARDS feeding into Scoring Engine               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- connector lines from signals up to Scoring Engine -->
  <path d="M 533 530 Q 533 410 908 305" stroke="#8B5CF6" stroke-width="2.2" fill="none" opacity="0.55" marker-end="url(#arrowIndigo)"/>
  <path d="M 908 540 L 908 305" stroke="#EC4899" stroke-width="2.2" fill="none" opacity="0.55" marker-end="url(#arrowIndigo)"/>
  <path d="M 1283 530 Q 1283 410 908 305" stroke="#3B82F6" stroke-width="2.2" fill="none" opacity="0.55" marker-end="url(#arrowIndigo)"/>

  <!-- Signals label -->
  <text x="908" y="410" text-anchor="middle" font-size="12" font-weight="700" fill="#9CA3AF" letter-spacing="2" text-transform="uppercase">
    THREE WEIGHTED SIGNALS
  </text>

  <!-- Signal card 1: TRUST / HISTORY -->
  <g filter="url(#softShadow)">
    <rect x="420" y="450" width="230" height="180" rx="20" fill="#fff" stroke="#E8E8EA"/>
    <rect x="420" y="450" width="230" height="6" rx="3" fill="url(#gIndigo)"/>
  </g>
  <!-- icon tile -->
  <rect x="444" y="478" width="44" height="44" rx="12" fill="url(#gIndigo)"/>
  <g transform="translate(466, 500)" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- user-check icon -->
    <circle cx="-3" cy="-3" r="6"/>
    <path d="M -11 11 C -11 5 5 5 5 11"/>
    <polyline points="6,-1 9,2 14,-3"/>
  </g>
  <!-- weight pill -->
  <rect x="570" y="484" width="58" height="26" rx="13" fill="url(#gIndigo)"/>
  <text x="599" y="502" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">40%</text>
  <!-- title + blurb -->
  <text x="444" y="550" font-size="16" font-weight="700" fill="#1A1A1A">Prior history</text>
  <text x="444" y="568" font-size="16" font-weight="700" fill="#1A1A1A">&amp; trust</text>
  <text x="444" y="594" font-size="11" fill="#6B7280">Strongest predictor.</text>
  <text x="444" y="610" font-size="11" fill="#6B7280">Repeat offenders escalate.</text>

  <!-- Signal card 2: LOCATION -->
  <g filter="url(#softShadow)">
    <rect x="793" y="450" width="230" height="180" rx="20" fill="#fff" stroke="#E8E8EA"/>
    <rect x="793" y="450" width="230" height="6" rx="3" fill="url(#gPink)"/>
  </g>
  <rect x="817" y="478" width="44" height="44" rx="12" fill="url(#gPink)"/>
  <g transform="translate(839, 500)" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- map-pin icon -->
    <path d="M 0 12 C 8 2 12 -4 12 -9 A 12 12 0 1 0 -12 -9 C -12 -4 -8 2 0 12 Z"/>
    <circle cx="0" cy="-8" r="4"/>
  </g>
  <rect x="943" y="484" width="58" height="26" rx="13" fill="url(#gPink)"/>
  <text x="972" y="502" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">35%</text>
  <text x="817" y="550" font-size="16" font-weight="700" fill="#1A1A1A">Location</text>
  <text x="817" y="568" font-size="16" font-weight="700" fill="#1A1A1A">integrity</text>
  <text x="817" y="594" font-size="11" fill="#6B7280">GPS vs IP mismatch.</text>
  <text x="817" y="610" font-size="11" fill="#6B7280">Impossible travel.</text>

  <!-- Signal card 3: CLUSTER -->
  <g filter="url(#softShadow)">
    <rect x="1170" y="450" width="230" height="180" rx="20" fill="#fff" stroke="#E8E8EA"/>
    <rect x="1170" y="450" width="230" height="6" rx="3" fill="url(#gBlue)"/>
  </g>
  <rect x="1194" y="478" width="44" height="44" rx="12" fill="url(#gBlue)"/>
  <g transform="translate(1216, 500)" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- users icon -->
    <circle cx="-5" cy="-4" r="4.5"/>
    <circle cx="6" cy="-4" r="4.5"/>
    <path d="M -13 10 C -13 4 -1 4 -1 10"/>
    <path d="M -1 10 C -1 4 14 4 14 10"/>
  </g>
  <rect x="1320" y="484" width="58" height="26" rx="13" fill="url(#gBlue)"/>
  <text x="1349" y="502" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">25%</text>
  <text x="1194" y="550" font-size="16" font-weight="700" fill="#1A1A1A">Ring /</text>
  <text x="1194" y="568" font-size="16" font-weight="700" fill="#1A1A1A">cluster</text>
  <text x="1194" y="594" font-size="11" fill="#6B7280">Shared devices, IPs,</text>
  <text x="1194" y="610" font-size="11" fill="#6B7280">or single GPS spot.</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- THE SCALE: each routing outcome under Routing                    -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- arrows from routing to outcomes -->
  <path d="M 1174 295 Q 1174 715 205 715" stroke="#22C55E" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="0"/>
  <path d="M 1174 295 L 1174 715" stroke="#F59E0B" stroke-width="2" fill="none" opacity="0.55"/>

  <!-- Outcomes row (bottom) -->
  <text x="700" y="690" text-anchor="middle" font-size="12" font-weight="700" fill="#9CA3AF" letter-spacing="2">
    ROUTING OUTCOMES
  </text>

  <!-- Outcome 1: AUTO-APPROVE -->
  <g filter="url(#softShadow)">
    <rect x="90" y="720" width="300" height="130" rx="18" fill="url(#gGreen)"/>
  </g>
  <!-- check-circle icon -->
  <g transform="translate(140, 765)" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="22"/>
    <polyline points="-9,0 -2,7 10,-6"/>
  </g>
  <text x="190" y="765" font-size="20" font-weight="800" fill="#fff">Auto-pay</text>
  <text x="190" y="790" font-size="12" fill="rgba(255,255,255,0.88)">Payout hits UPI in minutes</text>
  <text x="190" y="810" font-size="11" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.78)">score &lt; 30%</text>
  <text x="190" y="828" font-size="10" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.65)">trust += 0.05</text>

  <!-- Outcome 2: FLAG -->
  <g filter="url(#softShadow)">
    <rect x="420" y="720" width="300" height="130" rx="18" fill="url(#gAmber)"/>
  </g>
  <g transform="translate(470, 765)" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- alert-triangle -->
    <path d="M 0 -20 L 20 16 L -20 16 Z"/>
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <circle cx="0" cy="12" r="1.5" fill="#fff" stroke="none"/>
  </g>
  <text x="520" y="765" font-size="20" font-weight="800" fill="#fff">Flag</text>
  <text x="520" y="790" font-size="12" fill="rgba(255,255,255,0.88)">Paid, but marked for review</text>
  <text x="520" y="810" font-size="11" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.78)">30% ≤ score &lt; 70%</text>
  <text x="520" y="828" font-size="10" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.65)">is_flagged = true</text>

  <!-- Outcome 3: MANUAL REVIEW -->
  <g filter="url(#softShadow)">
    <rect x="750" y="720" width="300" height="130" rx="18" fill="url(#gRed)"/>
  </g>
  <g transform="translate(800, 765)" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- shield-alert -->
    <path d="M 0 -20 L -16 -14 V -2 C -16 10 -8 18 0 22 C 8 18 16 10 16 -2 V -14 Z"/>
    <line x1="0" y1="-8" x2="0" y2="4"/>
    <circle cx="0" cy="10" r="1.5" fill="#fff" stroke="none"/>
  </g>
  <text x="850" y="765" font-size="20" font-weight="800" fill="#fff">Manual review</text>
  <text x="850" y="790" font-size="12" fill="rgba(255,255,255,0.88)">Admin approves or rejects</text>
  <text x="850" y="810" font-size="11" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.78)">score ≥ 70%</text>
  <text x="850" y="828" font-size="10" font-family="IBM Plex Mono, monospace" fill="rgba(255,255,255,0.65)">status = pending_review</text>

  <!-- SIDE NOTE: audit / trust update -->
  <g>
    <rect x="1080" y="720" width="280" height="130" rx="18" fill="#fff" stroke="#E8E8EA" stroke-dasharray="5,4"/>
    <g transform="translate(1110, 752)" fill="none" stroke="#64748B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- archive / database -->
      <ellipse cx="0" cy="-6" rx="14" ry="5"/>
      <path d="M -14 -6 V 6 C -14 9 14 9 14 6 V -6"/>
      <path d="M -14 0 C -14 3 14 3 14 0"/>
    </g>
    <text x="1155" y="750" font-size="13" font-weight="700" fill="#1A1A1A">Side effects</text>
    <text x="1100" y="780" font-size="11" fill="#6B7280">• fraud_cluster_signals (audit)</text>
    <text x="1100" y="798" font-size="11" fill="#6B7280">• trust_score adjusted ±0.05 / −0.20</text>
    <text x="1100" y="816" font-size="11" fill="#6B7280">• fraud_signals JSONB per claim</text>
    <text x="1100" y="834" font-size="11" fill="#6B7280">• Fraud Center: live view + appeal</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- FOOT LEGEND / KEY                                                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(90, 878)">
    <circle cx="0" cy="0" r="5" fill="#1A1A1A"/>
    <text x="14" y="4" font-size="11" fill="#1A1A1A">Backend-only checks (duplicate, rapid, weather-mismatch) are</text>
    <text x="14" y="18" font-size="11" fill="#6B7280">system-health — not weighted as driver fraud.</text>
  </g>
</svg>
